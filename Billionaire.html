<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billionaire System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2027;
  color:#fff;
  text-align:center
}

.container{padding:20px}
h1{font-size:32px}

.card{
  background:#1c2b36;
  padding:20px;
  margin:15px;
  border-radius:20px;
}

#quote{
  font-size:26px;
  margin-top:15px;
  font-weight:bold;
  line-height:1.4;
}

button{
  padding:12px 18px;
  margin:8px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  background:#00c9ff;
  color:#000;
}

.progress{
  height:20px;
  background:#333;
  border-radius:10px;
  margin-top:10px
}

.progress-bar{
  height:100%;
  background:#00c9ff;
  border-radius:10px;
  width:0%
}

.footer{
  margin-top:30px;
  padding:20px;
  background:#1c2b36;
  border-radius:15px;
  font-size:14px;
  color:#aaa
}

.footer a{
  color:#00c9ff;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
<h1>💰 Billionaire System</h1>

<div class="card">
<h3>🔥 Motivation Engine</h3>
<div id="quote">Loading...</div>

<button onclick="nextQuote()">Next</button>
<button onclick="copyQuote()">Copy</button>
<button onclick="shareQuote()">Share</button>
<button onclick="saveQuote()">Save</button>
</div>

<div class="card">
<h3>📂 Categories</h3>
<button onclick="setCategory('all')">All</button>
<button onclick="setCategory('money')">Money</button>
<button onclick="setCategory('discipline')">Discipline</button>
<button onclick="setCategory('success')">Success</button>
<button onclick="setCategory('mindset')">Mindset</button>
</div>

<div class="card">
<h3 id="streak">🔥 Streak: 0 days</h3>
</div>

<div class="card">
<h3>⭐ Favorites</h3>
<button onclick="saveQuote()">Save Quote</button>
<button onclick="showSaved()">Show Saved</button>
<div id="savedQuotes"></div>
</div>

<div class="card">
<h3>📊 Daily Money Tracker</h3>
<input id="moneyInput" type="number" placeholder="Enter amount made today">
<button onclick="saveMoney()">Save</button>
<div id="moneyLog"></div>
</div>

<div class="card">
<h3>🎯 R0 → R1M Goal</h3>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
<div id="goalText"></div>
</div>

<div class="card">
<h3>🔔 Notifications</h3>
<button onclick="enableNotifications()">Enable Alerts</button>
</div>

<div class="footer">
<p>
<a href="https://facebook.com/pabja.mhusler" target="_blank">📘 Facebook</a> | 
<a href="https://tiktok.com/@officialmhusler" target="_blank">🎵 TikTok</a>
</p>
</div>

</div>

<script>
// ===== MASSIVE QUOTE ENGINE =====
const starters=["Build","Create","Hustle","Focus","Grind","Execute","Master","Chase","Design","Forge","Elevate","Dominate","Win","Rise"];
const actions=["wealth","discipline","power","momentum","freedom","success","greatness","legacy","confidence","strength","focus","results","money","skills"];
const styles=["daily","relentlessly","without excuses","like a machine","with purpose","with intensity","non-stop","every single day","with discipline","like a champion"];
const endings=[
"and never look back.",
"until you win.",
"no matter the cost.",
"and dominate your goals.",
"because failure is not an option.",
"and prove them wrong.",
"until success is yours.",
"and become unstoppable.",
"and rise above average.",
"and change your life forever."
];

let currentCategory="all";
let lastQuote="";

const categoryWords={
money:["wealth","money","income","profit","riches","cash"],
discipline:["discipline","focus","consistency","control","habits"],
success:["success","winning","achievement","greatness"],
mindset:["mindset","belief","confidence","vision","thinking"]
};

function getRandomAction(){
 if(currentCategory==="all"){
  return actions[Math.floor(Math.random()*actions.length)];
 } else {
  return categoryWords[currentCategory][Math.floor(Math.random()*categoryWords[currentCategory].length)];
 }
}

function generateQuote(){
 let quote="";
 const type=Math.floor(Math.random()*4);

 const s=starters[Math.floor(Math.random()*starters.length)];
 const a=getRandomAction();
 const st=styles[Math.floor(Math.random()*styles.length)];
 const e=endings[Math.floor(Math.random()*endings.length)];

 if(type===0){
  quote=`${s} ${a} ${st} ${e}`;
 } else if(type===1){
  quote=`${st.toUpperCase()}, ${s.toLowerCase()} your ${a} ${e}`;
 } else if(type===2){
  quote=`${s} your ${a} ${st} — ${e}`;
 } else {
  quote=`${s} ${st}. Build your ${a} ${e}`;
 }

 if(quote===lastQuote){return generateQuote();}
 lastQuote=quote;
 return quote;
}

function nextQuote(){
 document.getElementById("quote").innerText=generateQuote();
}

function setCategory(cat){
 currentCategory=cat;
 nextQuote();
}

setInterval(nextQuote,4*60*60*1000);
nextQuote();

// ===== STREAK =====
let streak=localStorage.getItem("streak")?parseInt(localStorage.getItem("streak")):0;
let lastVisit=localStorage.getItem("lastVisit");

function updateStreak(){
 const today=new Date().toDateString();
 if(lastVisit!==today){
  streak++;
  localStorage.setItem("streak",streak);
  localStorage.setItem("lastVisit",today);
 }
 document.getElementById("streak").innerText="🔥 Streak: "+streak+" days";
}
updateStreak();

// ===== FAVORITES =====
function saveQuote(){
 let q=document.getElementById("quote").innerText;
 let saved=JSON.parse(localStorage.getItem("quotes")||"[]");

 if(!saved.includes(q)){
  saved.push(q);
  localStorage.setItem("quotes",JSON.stringify(saved));
  alert("Saved!");
 }
}

function showSaved(){
 let saved=JSON.parse(localStorage.getItem("quotes")||"[]");
 document.getElementById("savedQuotes").innerHTML=saved.map(q=>`<p>${q}</p>`).join("");
}

// ===== COPY & SHARE =====
function copyQuote(){
 let q=document.getElementById("quote").innerText;
 navigator.clipboard.writeText(q);
 alert("Copied!");
}

function shareQuote(){
 let q=document.getElementById("quote").innerText;
 if(navigator.share){
  navigator.share({text:q});
 } else {
  copyQuote();
 }
}

// ===== MONEY TRACKER =====
let total=localStorage.getItem("money")?parseFloat(localStorage.getItem("money")):0;
updateUI();

function saveMoney(){
 let val=parseFloat(document.getElementById("moneyInput").value);
 if(!isNaN(val)){
  total+=val;
  localStorage.setItem("money",total);
  updateUI();
 }
}

function updateUI(){
 document.getElementById("moneyLog").innerText="Total: R"+total;
 let percent=(total/1000000)*100;
 document.getElementById("bar").style.width=percent+"%";
 document.getElementById("goalText").innerText=percent.toFixed(2)+"% to R1M";
}

// ===== NOTIFICATIONS =====
function enableNotifications(){
 Notification.requestPermission().then(p=>{
  if(p==='granted'){
    setInterval(()=>{
      new Notification("💰 Stay Focused",{body:generateQuote()});
    },4*60*60*1000);
  }
 });
}
</script>

</body>
</html>
