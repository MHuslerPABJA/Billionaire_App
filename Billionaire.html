<script>
// ===== MOTIVATION (ADVANCED AI STYLE GENERATION) =====

// Expanded word banks (BIG upgrade)
const starters = ["Build","Create","Hustle","Focus","Grind","Execute","Master","Chase","Design","Forge","Elevate","Dominate"];
const actions = ["wealth","discipline","power","momentum","freedom","success","greatness","legacy","confidence","strength","focus","results"];
const styles = ["daily","relentlessly","without excuses","like a machine","with purpose","with intensity","non-stop","every single day","with discipline","like a champion"];
const endings = [
  "and never look back.",
  "until you win.",
  "no matter the cost.",
  "and dominate your goals.",
  "because failure is not an option.",
  "and prove them wrong.",
  "until success is yours.",
  "and become unstoppable.",
  "and rise above average.",
  "and change your life forever."
];

// Prevent repeating the same quote
let lastQuote = "";

// Generate quote with multiple sentence styles
function generateQuote(){
  let quote = "";
  const type = Math.floor(Math.random() * 4);

  const s = starters[Math.floor(Math.random()*starters.length)];
  const a = actions[Math.floor(Math.random()*actions.length)];
  const st = styles[Math.floor(Math.random()*styles.length)];
  const e = endings[Math.floor(Math.random()*endings.length)];

  if(type === 0){
    quote = `${s} ${a} ${st} ${e}`;
  } 
  else if(type === 1){
    quote = `${st.toUpperCase()}, ${s.toLowerCase()} your ${a} ${e}`;
  } 
  else if(type === 2){
    quote = `${s} your ${a} ${st} — ${e}`;
  }
  else {
    quote = `${s} ${st}. Build your ${a} ${e}`;
  }

  // Avoid immediate repeats
  if(quote === lastQuote){
    return generateQuote();
  }

  lastQuote = quote;
  return quote;
}

function nextQuote(){
  document.getElementById("quote").innerText = generateQuote();
}

// Auto refresh every 4 hours
setInterval(nextQuote,4*60*60*1000);
nextQuote();
</script>
